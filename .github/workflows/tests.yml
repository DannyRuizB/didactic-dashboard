name: tests

# Unit tests (Node's built-in test runner) on every push and pull request.
# Dependencies are needed since v0.7.0: the metrics tests require prom-client,
# and the /metrics e2e test boots the real server (express, better-sqlite3...).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: node --test
