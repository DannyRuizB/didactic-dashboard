name: lint

# Static analysis on every push and pull request: ESLint over the Node backend
# (CommonJS), the browser code in src/public, and the test suite. No host is
# touched — this only reads the code. Unit tests run in the separate tests
# workflow.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint
