services:
  dashboard:
    build: .
    image: dannyruizb/didactic-dashboard:latest
    container_name: didactic-dashboard
    ports:
      - "3000:3000"
    volumes:
      - didactic-data:/app/data
      # Read-only mount of your SSH config so the container can collect
      # metrics from remote hosts via SSH without duplicating keys.
      # Remove this line if you only need ICMP / TCP checks.
      - ~/.ssh:/root/.ssh:ro
    environment:
      - PORT=3000
      - DB_PATH=/app/data/dashboard.db
      - PING_INTERVAL=10000
      - DEMO_MODE=${DEMO_MODE:-false}
      # Alerts engine — see README "Alerts" section for the full list.
      # Uncomment ALERT_WEBHOOK_URL to forward alert transitions as JSON
      # to Discord / Slack / ntfy.sh / your own endpoint.
      # - CPU_WARN=70
      # - CPU_CRIT=90
      # - RAM_WARN=80
      # - RAM_CRIT=95
      # - DISK_WARN=80
      # - DISK_CRIT=90
      # - ALERT_DOWN_AFTER=2
      # - ALERT_WEBHOOK_URL=https://example.com/webhook
      # Email channel — see README "Alerts > Email (SMTP)" for Gmail setup.
      # Both SMTP_HOST and ALERT_EMAIL_TO must be set to enable it.
      # - SMTP_HOST=smtp.gmail.com
      # - SMTP_PORT=465
      # - SMTP_SECURE=true
      # - SMTP_USER=you@gmail.com
      # - SMTP_PASS=your-app-password
      # - ALERT_EMAIL_FROM=you@gmail.com
      # - ALERT_EMAIL_TO=ops@example.com
    restart: unless-stopped

volumes:
  didactic-data:
