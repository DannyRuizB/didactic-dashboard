<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>didactic-dashboard</title>
  <script>
    (function () {
      var t = localStorage.getItem('didactic-theme') || 'dark';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <div class="title-row">
      <h1>&gt; didactic-dashboard</h1>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">theme: dark</button>
    </div>
    <p class="sub">simple network monitor &middot; v0.1</p>
  </header>

  <main>
    <form id="add-form" class="add-form" autocomplete="off">
      <input id="ip-input"   type="text"   placeholder="IP or hostname" required>
      <select id="check-type" class="check-type">
        <option value="icmp">ICMP</option>
        <option value="tcp">TCP</option>
        <option value="ssh">SSH</option>
      </select>
      <input id="user-input" type="text"   placeholder="SSH user" class="field-ssh" hidden>
      <input id="port-input" type="number" placeholder="port" min="1" max="65535" class="field-port port-field" hidden>
      <input id="name-input" type="text"   placeholder="name (optional)">
      <button type="submit">+ add</button>
    </form>
    <p class="hint">ICMP = ping &middot; TCP = connect to port (works through VPNs blocking ICMP) &middot; SSH = connect and collect CPU / RAM / disk metrics (your <code>~/.ssh</code> key must be authorized on the target host)</p>

    <div id="error-box" class="error-box" hidden></div>

    <section id="hosts" class="hosts"></section>
  </main>

  <footer class="page-footer">
    <span>didactic-dashboard v0.1</span>
    <a href="https://github.com/DannyRuizB/didactic-dashboard" target="_blank" rel="noopener">github.com/DannyRuizB/didactic-dashboard</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
