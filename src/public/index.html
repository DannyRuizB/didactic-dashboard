<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>didactic-dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <h1>&gt; didactic-dashboard</h1>
    <p class="sub">simple network monitor &middot; v0.1</p>
  </header>

  <main>
    <form id="add-form" class="add-form" autocomplete="off">
      <input id="ip-input"   type="text"   placeholder="IP or hostname (e.g. 192.168.1.1)" required>
      <input id="port-input" type="number" placeholder="TCP port (optional, e.g. 22)" min="1" max="65535" class="port-field">
      <input id="name-input" type="text"   placeholder="name (optional)">
      <button type="submit">+ add</button>
    </form>
    <p class="hint">Leave port empty for ICMP ping. Set a port (22, 80, 443...) to check via TCP — works through VPNs / firewalls that drop ICMP.</p>

    <div id="error-box" class="error-box" hidden></div>

    <section id="hosts" class="hosts"></section>
  </main>

  <footer class="page-footer">
    <span>didactic-dashboard v0.1</span>
    <a href="https://github.com/DannyRuizB/didactic-dashboard" target="_blank" rel="noopener">github.com/DannyRuizB/didactic-dashboard</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
