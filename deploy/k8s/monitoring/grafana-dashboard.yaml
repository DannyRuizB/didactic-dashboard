# Grafana dashboard for the app. The stack's sidecar watches every ConfigMap
# labeled grafana_dashboard=1 and auto-imports the JSON, so there is nothing
# to click in the UI. Open it at http://grafana.local -> "didactic-dashboard".
apiVersion: v1
kind: ConfigMap
metadata:
  name: didactic-dashboard-grafana
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  didactic-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(didactic_monitored_hosts)",
              "legendFormat": "hosts",
              "refId": "A"
            }
          ],
          "title": "Hosts monitored",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(didactic_host_up)",
              "legendFormat": "up",
              "refId": "A"
            }
          ],
          "title": "Hosts up",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(didactic_monitored_hosts) - sum(didactic_host_up)",
              "legendFormat": "down",
              "refId": "A"
            }
          ],
          "title": "Hosts down",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 1 } ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(didactic_active_alerts)",
              "legendFormat": "active alerts",
              "refId": "A"
            }
          ],
          "title": "Active alerts",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "showPoints": "never" },
              "min": 0,
              "unit": "none"
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "down" },
                "properties": [ { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } } ]
              },
              {
                "matcher": { "id": "byName", "options": "up" },
                "properties": [ { "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } } ]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "id": 5,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(didactic_host_up)",
              "legendFormat": "up",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(didactic_monitored_hosts) - sum(didactic_host_up)",
              "legendFormat": "down",
              "refId": "B"
            }
          ],
          "title": "Hosts up vs down",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "showPoints": "never" },
              "min": 0,
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "id": 6,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum by (le) (rate(didactic_probe_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum by (le) (rate(didactic_probe_duration_seconds_bucket[$__rate_interval])))",
              "legendFormat": "p95",
              "refId": "B"
            }
          ],
          "title": "Probe duration (p50 / p95)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "showPoints": "never" },
              "min": 0,
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 13 },
          "id": 7,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(didactic_alerts_fired_total[$__rate_interval]))",
              "legendFormat": "alerts fired / s",
              "refId": "A"
            }
          ],
          "title": "Alerts fired (rate)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "showPoints": "never" },
              "min": 0,
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 13 },
          "id": 8,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "process_resident_memory_bytes{job=\"didactic-dashboard\"}",
              "legendFormat": "RSS",
              "refId": "A"
            }
          ],
          "title": "App memory (RSS)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "fillOpacity": 10, "showPoints": "never" },
              "min": 0,
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 13 },
          "id": 9,
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(process_cpu_seconds_total{job=\"didactic-dashboard\"}[$__rate_interval])",
              "legendFormat": "CPU",
              "refId": "A"
            }
          ],
          "title": "App CPU usage",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [ "didactic-dashboard" ],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "didactic-dashboard",
      "uid": "didactic-dashboard",
      "version": 1
    }
