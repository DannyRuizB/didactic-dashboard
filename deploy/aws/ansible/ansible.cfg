[defaults]
inventory = ./inventory.ini
# The hardening roles live inside the vendored clone (see requirements.yml).
roles_path = ./vendor/debian-hardening-ansible/roles:./roles
# Singular "collections_path" — current ansible-core silently ignores the
# old plural key, which would send module lookups back to ~/.ansible.
collections_path = ./collections
# First boot of a throwaway VM: the host key is new every time, so pinning it
# would only break the run. Do not carry this setting onto long-lived infra.
host_key_checking = False
interpreter_python = auto_silent
